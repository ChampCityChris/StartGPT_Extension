<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StartGPT Sidebar</title>
    <link rel="stylesheet" href="./sidebar.css" />
  </head>
  <body>
    <main class="sidebar" id="sidebar-root">
      <header class="sidebar-header">
        <h1>StartGPT Sidebar</h1>
        <p class="subtitle">Browser-only BYOK mode</p>
      </header>

      <section class="panel">
        <h2>Current Query</h2>
        <p id="current-query">No Startpage query captured yet.</p>
      </section>

      <section class="panel">
        <div id="status-banner" role="status" aria-live="polite"></div>
      </section>

      <section class="panel">
        <h2>Runtime</h2>
        <p id="startpage-signal">Waiting for Startpage context.</p>
        <p id="api-key-signal">API key status unknown.</p>
      </section>

      <section class="panel">
        <h2>Overview</h2>
        <article id="response-body"></article>
      </section>

      <section class="panel">
        <h2>Sources</h2>
        <ul id="sources-list"></ul>
      </section>

      <section class="panel">
        <h2>Mode</h2>
        <label for="summary-mode">Run summary mode</label>
        <select id="summary-mode">
          <option value="">Use default from settings</option>
          <option value="quick_overview">Quick overview</option>
          <option value="expanded_perplexity">Expanded (perplexity-style)</option>
        </select>
      </section>

      <section class="panel">
        <h2>Ask Follow-up</h2>
        <form id="follow-up-form">
          <label class="visually-hidden" for="follow-up-input">Follow-up question</label>
          <textarea id="follow-up-input" rows="3" placeholder="Ask a follow-up question"></textarea>
          <div class="action-row">
            <button id="follow-up-submit" type="submit">Ask Follow-up</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="action-row">
          <button id="regenerate-button" type="button">Run StartGPT</button>
          <button id="open-settings-button" type="button">Open Settings</button>
        </div>
      </section>

      <section class="panel">
        <p id="error-area" role="alert" aria-live="assertive"></p>
      </section>

      <section class="panel">
        <p id="meta-info"></p>
      </section>
    </main>
    <script type="module" src="./sidebar.js"></script>
  </body>
</html>
